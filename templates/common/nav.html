<style>
    .navbar {
        background-color: #212529;
        padding: 1rem;
        margin-bottom: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    nav {
        display: flex;
        gap: 15px;
    }
    .nav-btn {
        color: #adb5bd;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 4px;
        transition: all 0.3s;
    }
    .nav-btn:hover {
        color: white;
        background-color: #343a40;
    }
    .nav-btn.active {
        color: white;
        background-color: #0d6efd;
        font-weight: bold;
    }
</style>

<header class="navbar shadow-sm">
    <nav class="d-flex w-100 align-items-center">
        <a href="#" class="nav-btn">Dashboard</a>
        <a href="{% url 'accounts:employee-list' %}" class="nav-btn">Employees</a>
        <a href="{% url 'clients:clients-list' %}" class="nav-btn">Clients</a>
        <a href="{% url 'projects:projects-list' %}" class="nav-btn">Projects</a>
        <a href="#" class="nav-btn">Activity</a>
        <a href="#" class="nav-btn">Invoices</a>

        <div class="ms-auto d-flex align-items-center gap-2">
            {% if user.is_authenticated %}
                <form action="{% url 'accounts:logout' %}" method="post" class="d-inline m-0">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn bg-transparent border-0 text-white">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </button>
                </form>

            {% else %}
                <a href="{% url 'accounts:login' %}" class="nav-btn">Login</a>
                <a href="{% url 'accounts:register' %}" class="nav-btn">Register</a>
            {% endif %}
        </div>

    </nav>
</header>
