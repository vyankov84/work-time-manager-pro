{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-8"> <div class="card shadow-lg border-0">
            <div class="bg-danger py-2"></div>
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-1 text-danger mb-3">
                        <i class="bi bi-exclamation-octagon"></i>
                    </div>
                    <h2 class="fw-bold">Terminate Project?</h2>
                    <p class="text-muted">
                        <strong>{{ project.name }}</strong> ({{ project.job_number }})
                    </p>
                </div>

                <div class="p-4 bg-light rounded-3 border mb-4">
                    <h6 class="text-uppercase text-muted fw-bold mb-3 small">Project Preview (Read Only)</h6>
                    <div class="row g-3">
                        {% for field in form %}
                        <div class="{% if field.name == 'description' or field.name == 'assigned_employees' %}col-12{% else %}col-md-6{% endif %}">
                            <label class="form-label fw-bold small text-muted">{{ field.label }}</label>
                            {{ field }}
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-2">
                        <div class="col-md-8">
                            <button type="submit" class="btn btn-danger btn-lg w-100 shadow-sm">
                                <i class="bi bi-trash3 me-2"></i> Delete
                            </button>
                        </div>
                        <div class="col-md-4">
                            <a href="{% url 'projects:project-details' project.pk %}" class="btn btn-outline-secondary btn-lg w-100">
                                No, Cancel
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
